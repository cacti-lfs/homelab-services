---
- name: "F2B: Installation"
  ansible.builtin.package:
   name: fail2ban
   state: present
  become: true

- name: "F2B: Configuration de base"
  ansible.builtin.copy:
   dest: /etc/fail2ban/jail.local
   content: |
     [DEFAULT]
     bantime = 3600
     findtime = 600
     maxretry = 5

      [sshd]
     enabled = true
     port = ssh
     filter = sshd
     logpath = /var/log/auth.log
   mode: '0644'
  become: true
  notify: Restart F2B
